[unix_http_server]
file=/tmp/supervisor.sock   ; đường dẫn đến socket file

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock ; phải khớp với file ở trên

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true

[program:app]
command=python src/mainServer.py
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true